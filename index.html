<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }
    header {
      padding: 50px 20px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff7b00;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #ff5500;
    }
    section {
      padding: 40px 20px;
    }
    footer {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      font-size: 0.9em;
    }
  </style>
</head>
<body><header>
  <h1>Welcome to My Website</h1>
  <p>This is my first website 🚀</p>
  <a href="#about" class="btn">Explore</a>
</header><section id="about">
  <h2>About Me</h2>
  <p>Hello! I'm learning web development and this is my creation.</p>
</section><section>
  <h2>Contact</h2>
  <p>Email: example@email.com</p>
</section><footer>
  <p>© 2026 My Website</p>
</footer></body>
</html>
